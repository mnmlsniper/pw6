name: pw6 gof autotests
# Когда запускаем
on: 
  push:
    branches:
      - main
# ручной запуск
  workflow_dispatch:

jobs:
  pw6tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
      - name: Устанавливаем пакеты из package.json
        run: npm ci
      - name: Устанавливаем браузеры
        run: npx playwright install --with-deps
      - name: Устанавливаем allure 3
        run: npm add allure
      - name: Запускаем тест
        run: npm t
      - name: list
        run: ls
      - name: Генерирую отчет allure 3 в один файл
        run: npx allure awesome ./allure-results --single-file
        continue-on-error: true
        if: always()
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        continue-on-error: true
        if: always()
        with:
          name: artifacts
          path: |
            allure-report/index.html
            allure-results
            playwright-report
        
        
